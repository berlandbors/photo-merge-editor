<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Merge Editor</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Hidden file inputs -->
  <input type="file" id="fileInput1" accept="image/*" style="display:none" data-layer="1" />
  <input type="file" id="fileInput2" accept="image/*" style="display:none" data-layer="2" />
  <input type="file" id="fileInput3" accept="image/*" style="display:none" data-layer="3" />

  <div class="app-layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">

      <!-- Sidebar header -->
      <div class="sidebar-header">
        <span class="app-title">📸 Photo Merge</span>
        <div class="ui-scale-wrap">
          <label for="uiScaleSlider" title="UI Scale">UI</label>
          <input type="range" id="uiScaleSlider" min="50" max="200" value="100" />
          <span id="uiScaleVal">100%</span>
        </div>
      </div>

      <!-- Layer cards -->
      <div class="layers-section">
        <div class="section-title">Layers</div>

        <!-- Layer 1 -->
        <div class="layer-card active" id="layerCard1" data-layer="1">
          <div class="layer-card-header">
            <span class="layer-name">Layer 1</span>
            <button class="btn-icon btn-delete" data-layer="1" title="Delete layer">✕</button>
          </div>
          <div class="layer-drop-zone" id="dropZone1" data-layer="1">
            <div class="thumb-wrap">
              <img class="layer-thumb" id="thumb1" src="" alt="" style="display:none" />
              <span class="drop-hint" id="dropHint1">Drop image here</span>
            </div>
            <button class="btn-choose" data-layer="1">Choose</button>
          </div>
        </div>

        <!-- Layer 2 -->
        <div class="layer-card" id="layerCard2" data-layer="2">
          <div class="layer-card-header">
            <span class="layer-name">Layer 2</span>
            <button class="btn-icon btn-delete" data-layer="2" title="Delete layer">✕</button>
          </div>
          <div class="layer-drop-zone" id="dropZone2" data-layer="2">
            <div class="thumb-wrap">
              <img class="layer-thumb" id="thumb2" src="" alt="" style="display:none" />
              <span class="drop-hint" id="dropHint2">Drop image here</span>
            </div>
            <button class="btn-choose" data-layer="2">Choose</button>
          </div>
        </div>

        <!-- Layer 3 -->
        <div class="layer-card" id="layerCard3" data-layer="3">
          <div class="layer-card-header">
            <span class="layer-name">Layer 3</span>
            <button class="btn-icon btn-delete" data-layer="3" title="Delete layer">✕</button>
          </div>
          <div class="layer-drop-zone" id="dropZone3" data-layer="3">
            <div class="thumb-wrap">
              <img class="layer-thumb" id="thumb3" src="" alt="" style="display:none" />
              <span class="drop-hint" id="dropHint3">Drop image here</span>
            </div>
            <button class="btn-choose" data-layer="3">Choose</button>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-wrap">
        <div class="tab-bar" role="tablist">
          <button class="tab-btn active" role="tab" data-tab="basic">⚙️ Basic</button>
          <button class="tab-btn" role="tab" data-tab="filters">🎨 Filters</button>
          <button class="tab-btn" role="tab" data-tab="effects">✨ Effects</button>
          <button class="tab-btn" role="tab" data-tab="bg">🤖 Background</button>
        </div>

        <!-- Basic tab -->
        <div class="tab-panel active" id="tab-basic" role="tabpanel">
          <div class="control-group">
            <label for="opacity-slider">Opacity <span class="val-badge" id="opacityVal">100</span></label>
            <input type="range" id="opacity-slider" min="0" max="100" value="100" data-prop="opacity" />
          </div>
          <div class="control-group">
            <label for="scale-slider">Scale <span class="val-badge" id="scaleVal">100</span></label>
            <input type="range" id="scale-slider" min="10" max="300" value="100" data-prop="scale" />
          </div>
          <div class="control-group">
            <label for="rotation-slider">Rotation <span class="val-badge" id="rotationVal">0</span>°</label>
            <input type="range" id="rotation-slider" min="0" max="360" value="0" data-prop="rotation" />
          </div>
          <div class="control-row">
            <div class="control-group half">
              <label for="pos-x">X</label>
              <input type="number" id="pos-x" value="200" data-prop="x" />
            </div>
            <div class="control-group half">
              <label for="pos-y">Y</label>
              <input type="number" id="pos-y" value="150" data-prop="y" />
            </div>
          </div>
          <div class="control-group">
            <label for="blend-mode">Blend Mode</label>
            <select id="blend-mode" data-prop="blendMode">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
              <option value="color-dodge">Color Dodge</option>
              <option value="hard-light">Hard Light</option>
            </select>
          </div>
          <div class="btn-row">
            <button class="btn-action" id="btnCenter">Center</button>
            <button class="btn-action" id="btnReset">Reset</button>
            <button class="btn-action" id="btnFlipH">Flip H</button>
            <button class="btn-action" id="btnFlipV">Flip V</button>
          </div>
        </div>

        <!-- Filters tab -->
        <div class="tab-panel" id="tab-filters" role="tabpanel">
          <div class="control-group">
            <label for="brightness-slider">Brightness <span class="val-badge" id="brightnessVal">0</span></label>
            <input type="range" id="brightness-slider" min="-100" max="100" value="0" data-prop="brightness" />
          </div>
          <div class="control-group">
            <label for="contrast-slider">Contrast <span class="val-badge" id="contrastVal">0</span></label>
            <input type="range" id="contrast-slider" min="-100" max="100" value="0" data-prop="contrast" />
          </div>
          <div class="control-group">
            <label for="saturation-slider">Saturation <span class="val-badge" id="saturationVal">0</span></label>
            <input type="range" id="saturation-slider" min="-100" max="100" value="0" data-prop="saturation" />
          </div>
          <div class="control-group">
            <label for="temperature-slider">Temperature <span class="val-badge" id="temperatureVal">0</span></label>
            <input type="range" id="temperature-slider" min="-100" max="100" value="0" data-prop="temperature" />
          </div>
          <div class="control-group">
            <label for="hue-slider">Hue <span class="val-badge" id="hueVal">0</span>°</label>
            <input type="range" id="hue-slider" min="0" max="360" value="0" data-prop="hue" />
          </div>
          <div class="presets-row">
            <span class="presets-label">Presets:</span>
            <button class="btn-preset" data-filter-preset="reset">Reset</button>
            <button class="btn-preset" data-filter-preset="bw">B&amp;W</button>
            <button class="btn-preset" data-filter-preset="sepia">Sepia</button>
            <button class="btn-preset" data-filter-preset="warm">Warm</button>
            <button class="btn-preset" data-filter-preset="cold">Cold</button>
            <button class="btn-preset" data-filter-preset="vintage">Vintage</button>
          </div>
        </div>

        <!-- Effects tab -->
        <div class="tab-panel" id="tab-effects" role="tabpanel">
          <div class="control-group">
            <label for="blur-slider">Blur <span class="val-badge" id="blurVal">0</span></label>
            <input type="range" id="blur-slider" min="0" max="20" value="0" data-prop="blur" />
          </div>
          <div class="control-group">
            <label for="sharpness-slider">Sharpness <span class="val-badge" id="sharpnessVal">0</span></label>
            <input type="range" id="sharpness-slider" min="0" max="100" value="0" data-prop="sharpness" />
          </div>
          <div class="control-group">
            <label for="vignette-slider">Vignette <span class="val-badge" id="vignetteVal">0</span></label>
            <input type="range" id="vignette-slider" min="0" max="100" value="0" data-prop="vignette" />
          </div>
          <div class="control-group">
            <label for="hdr-slider">HDR <span class="val-badge" id="hdrVal">0</span></label>
            <input type="range" id="hdr-slider" min="0" max="100" value="0" data-prop="hdr" />
          </div>
          <div class="control-group">
            <label for="grain-slider">Film Grain <span class="val-badge" id="grainVal">0</span></label>
            <input type="range" id="grain-slider" min="0" max="100" value="0" data-prop="grain" />
          </div>
          <div class="presets-row">
            <span class="presets-label">Presets:</span>
            <button class="btn-preset" data-effect-preset="soft">Soft</button>
            <button class="btn-preset" data-effect-preset="drama">Drama</button>
            <button class="btn-preset" data-effect-preset="dream">Dream</button>
            <button class="btn-preset" data-effect-preset="gritty">Gritty</button>
            <button class="btn-preset" data-effect-preset="cinema">Cinema</button>
          </div>
        </div>

        <!-- Background tab -->
        <div class="tab-panel" id="tab-bg" role="tabpanel">
          <div class="section-subtitle">Remove Background</div>
          <div class="btn-row">
            <button class="btn-action btn-primary" id="btnGrabcut">GrabCut AI</button>
            <button class="btn-action" id="btnCenterObj">Center Object</button>
            <button class="btn-action" id="btnContrast">Contrast</button>
            <button class="btn-action" id="btnFlood">Flood Fill</button>
          </div>
          <div class="control-group">
            <label for="sensitivity-slider">Sensitivity <span class="val-badge" id="sensitivityVal">30</span></label>
            <input type="range" id="sensitivity-slider" min="1" max="100" value="30" />
          </div>
          <div class="section-subtitle">Background Color</div>
          <div class="btn-row color-btns">
            <button class="btn-color" data-color="white" style="background:#fff;color:#000">White</button>
            <button class="btn-color" data-color="black" style="background:#000;color:#fff">Black</button>
            <button class="btn-color" data-color="green" style="background:#00b140;color:#fff">Green</button>
            <button class="btn-color" data-color="blue" style="background:#0078d4;color:#fff">Blue</button>
            <button class="btn-color" data-color="auto" style="background:linear-gradient(135deg,#e66,#6e6,#66e);color:#fff">Auto</button>
          </div>
          <div class="btn-row">
            <button class="btn-action btn-success" id="btnRestoreOrig">Restore Original</button>
          </div>
          <div class="section-subtitle">Fine-tune</div>
          <div class="btn-row">
            <button class="btn-action btn-sm" id="btnExpand">Expand</button>
            <button class="btn-action btn-sm" id="btnContract">Contract</button>
            <button class="btn-action btn-sm" id="btnSmoothEdges">Smooth Edges</button>
            <button class="btn-action btn-sm" id="btnInvert">Invert</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Resize handle -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- ===== WORKSPACE ===== -->
    <main class="workspace" id="workspace">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn-tool" data-layer-upload="1" title="Upload to Layer 1">L1 ↑</button>
          <button class="btn-tool" data-layer-upload="2" title="Upload to Layer 2">L2 ↑</button>
          <button class="btn-tool" data-layer-upload="3" title="Upload to Layer 3">L3 ↑</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="btn-tool" id="btnZoomIn" title="Zoom In">＋</button>
          <span class="zoom-display" id="zoomDisplay">100%</span>
          <button class="btn-tool" id="btnZoomOut" title="Zoom Out">－</button>
          <button class="btn-tool" id="btnFit" title="Fit to window">Fit</button>
          <button class="btn-tool" id="btnCenterCanvas" title="Center Canvas">⊕</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="btn-tool btn-download" id="btnDownload" title="Download">💾 Download</button>
          <button class="btn-tool btn-danger" id="btnClearAll" title="Clear All">🗑️ Clear</button>
        </div>
      </div>

      <!-- Canvas viewport -->
      <div class="canvas-viewport" id="canvasViewport">
        <div class="canvas-container" id="canvasContainer">
          <canvas id="mainCanvas" width="1400" height="900"></canvas>
          <div class="canvas-overlay" id="canvasOverlay"></div>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="statusMsg">Ready — click a layer card to select it, then drag an image onto the canvas.</span>
        <span class="status-right">Canvas: 1400 × 900 &nbsp;|&nbsp; Zoom: <span id="zoomStatus">100%</span></span>
      </div>
    </main>
  </div>

  <!-- Toast / hint -->
  <div class="hint-toast" id="hintToast"></div>

  <!-- Loading spinner -->
  <div class="spinner-overlay" id="spinnerOverlay" style="display:none">
    <div class="spinner"></div>
    <div class="spinner-label" id="spinnerLabel">Processing…</div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
